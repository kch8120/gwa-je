<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권채혁</title>
    <style>
    html, body{margin: 0; padding: 0; height: 120%}
    header {width: 100%; height: 5%;
        background: white;}
    section {width: 100%; height: 77%; float: left;
        background: skyblue;}
    footer {width: 100%; height: 21%; clear: both;
        background: yellow;}
    </style>
</head>
<body>
<header><h2>명함 신청 페이지</h2></header>
<section>
    <form>
        <ol>
            <li>학년: <select name="china">
                <option value="1" selected>1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
            </select>
            </li>
            <li><p>반: <select name="china">
                <option value="1" selected>1반</option>
                <option value="2">2반</option>
                <option value="3">3반</option>
                <option value="4">4반</option>
            </select></p>
            </li>
            <li><p>번호: <input type="number" size="15" value=""></li></p>
            <li><p>이름: <input type="name" size="20" value=""></li></p>
            <li><p>원하는 시안 번호 선택</li>
            <img src='https://lh7-rt.googleusercontent.com/formsz/AN7BsVCherQ6yMUjmXW0gCRKc1nZuHfLQV0kwh2n64XaO7WTbSKZLBxS2T-1ne4VtoAT8k6LIcmieNu_M9Mf6iw7wukTLGHW0y3pX21-pIelI0Vv2llcuQYizn-Q3LHjM5uVBhqVYeuuCXrvyjAVyvy2kf5QGYvTdBhMJCVx?key=zXC0opYBWS7IVmphVU1lkQ', width="600"><br>
            1안 <input type="radio" name="an" value="1">
            2안 <input type="radio" name="an" value="2">
            3안 <input type="radio" name="an" value="3">
            4안 <input type="radio" name="an" value="4"><br>
            5안 <input type="radio" name="an" value="5">
            6안 <input type="radio" name="an" value="6">
            7안 <input type="radio" name="an" value="7">
            8안 <input type="radio" name="an" value="8"></p>
            <li>내가 명함에 넣고 싶은 항목 선택
                <p>
                <input type="checkbox" value="1">이름
                <input type="checkbox" value="2">이메일<br>
                <input type="checkbox" value="3">디스코드 아이디
                <input type="checkbox" value="4">깃헙 아이디<br>
                <input type="checkbox" value="5">관심분야
                <input type="checkbox" value="6">휴대폰 번호</p>
            </li>
            <li>기타 건의사항
                <p><textarea
                cols="20"
                rows="10"
                wrap="HARD">
                </textarea></p>
                <br><input type="submit" value="전송하기"> <button>초기화하기</button>
            </li>
        </ol>
        
    </form>
</section>

<footer><p>
    <h2>QnA</h2>
    <details>
        <summary>3월 11일까지 제출합니다</summary>
        <p>언제까지 내요?</p>
    </details>
    <details>
        <summary>무료입니다</summary>
        <p>명함 얼마에요?</p>
    </details>
    <details>
        <summary>늦게 내면 어떻게돼요?</summary>
        <p>1학년 <ins><b>전원</b></ins>의 명함발급이 늦어집니다.</p>
    </details>
</footer></p>
</body>
</html>
